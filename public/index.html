<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentorship Feedback & Academic Monitoring System</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="site-header">
        <div class="container header-inner">
            <div class="brand">Mentorship<span class="brand-accent">Hub</span></div>
            <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card card">
            <h1 class="auth-title">Mentorship Feedback & Academic Monitoring</h1>
            <p class="auth-subtitle">Sign in to continue</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="you@college.edu">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            <p class="auth-register">Don't have an account? <a href="register.html">Register</a></p>
            <div id="msg" class="alert" style="display: none;"></div>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.style.display = 'none';
            try {
                const fd = new FormData(e.target);
                const res = await api('auth/login', {
                    method: 'POST',
                    body: JSON.stringify(Object.fromEntries(fd))
                });
                msg.className = 'alert alert-success';
                msg.textContent = 'Login successful! Redirecting...';
                msg.style.display = 'block';
                const dest = res.user.role === 'admin' ? 'admin/dashboard.html' : res.user.role === 'mentor' ? 'mentor/dashboard.html' : 'student/dashboard.html';
                setTimeout(() => location.href = dest, 800);
            } catch (err) {
                msg.className = 'alert alert-danger';
                msg.textContent = err.message || 'Login failed';
                msg.style.display = 'block';
            }
        });
    </script>
</body>

</html>

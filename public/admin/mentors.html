<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Performance - Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Admin Portal</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="students.html">Student Performance</a>
            <a href="mentors.html" class="active">Mentor Performance</a>
            <a href="feedback.html">Feedback Management</a>
            <a href="assignments.html">Assignments</a>
            <a href="questions.html">Questions</a>
            <a href="reports.html">Reports</a>
            <a href="../index.html" onclick="logout()">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <h1>Mentor Performance Monitoring</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">View mentor profiles, ratings, trends.</p>

        <div class="card">
            <h3 class="card-title">Mentor Comparison</h3>
            <canvas id="comparisonChart" height="120"></canvas>
        </div>

        <div class="card">
            <h3 class="card-title">Mentor List</h3>
            <div id="mentorList"></div>
        </div>

        <div id="profileModal" class="card" style="display: none;">
            <h3 class="card-title">Mentor Profile</h3>
            <div id="mentorProfileContent"></div>
            <canvas id="trendChart" height="120"></canvas>
            <button class="btn btn-secondary" onclick="document.getElementById('profileModal').style.display='none'">Close</button>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        async function loadComparison() {
            try {
                const res = await api('admin/mentors/comparison');
                const m = res.mentors || [];
                new Chart(document.getElementById('comparisonChart'), {
                    type: 'bar',
                    data: { labels: m.map(x => x.name), datasets: [{ label: 'Avg Rating', data: m.map(x => x.avg_rating || 0), backgroundColor: '#3b82f6' }] },
                    options: { responsive: true, scales: { y: { beginAtZero: true, max: 5 } } }
                });
                document.getElementById('mentorList').innerHTML = m.map(x =>
                    '<p><button class="btn btn-secondary btn-sm" onclick="loadMentorProfile(' + x.mentor_id + ')">View</button> ' + x.name + ' - ' + x.department + ' (Avg: ' + (x.avg_rating || '-') + ')</p>'
                ).join('');
            } catch (e) { console.error(e); }
        }
        async function loadMentorProfile(id) {
            try {
                const res = await api('admin/mentors/' + id + '/profile');
                document.getElementById('mentorProfileContent').innerHTML = '<p><strong>' + res.mentor.name + '</strong></p><p>Students: ' + res.total_students_assigned + ' | Avg: ' + (res.average_rating || '-') + '</p>';
                if (res.feedback_trends && res.feedback_trends.length) {
                    new Chart(document.getElementById('trendChart'), {
                        type: 'line',
                        data: { labels: res.feedback_trends.map(t => t.date), datasets: [{ label: 'Rating', data: res.feedback_trends.map(t => t.avg_rating), borderColor: '#3b82f6', fill: false }] },
                        options: { responsive: true, scales: { y: { min: 0, max: 5 } } }
                    });
                }
                document.getElementById('profileModal').style.display = 'block';
            } catch (e) { console.error(e); }
        }
        async function logout() { await api('auth/logout', { method: 'POST' }); }
        loadComparison();
    </script>
</body>
</html>

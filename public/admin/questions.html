<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions - Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">Admin Portal</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="students.html">Student Performance</a>
            <a href="mentors.html">Mentor Performance</a>
            <a href="feedback.html">Feedback Management</a>
            <a href="assignments.html">Assignments</a>
            <a href="questions.html" class="active">Questions</a>
            <a href="reports.html">Reports</a>
            <a href="../index.html" onclick="logout()">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <h1>Feedback Questions</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Create and manage feedback questions.</p>

        <div class="card">
            <h3 class="card-title">Create Question</h3>
            <form id="questionForm">
                <div class="form-group">
                    <label>Question Text</label>
                    <input type="text" name="question_text" placeholder="e.g., Rate the mentorship session" required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select name="question_type" required>
                        <option value="rating">Rating (1-5)</option>
                        <option value="yes-no">Yes/No</option>
                        <option value="text">Text Response</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Create</button>
            </form>
            <div id="msg" class="alert" style="display: none; margin-top: 1rem;"></div>
        </div>
        <div class="card">
            <h3 class="card-title">Existing Questions</h3>
            <div id="questionsList"></div>
        </div>
    </main>
    <script src="../js/api.js"></script>
    <script>
        async function loadQuestions() {
            try {
                const res = await api('admin/questions');
                const list = document.getElementById('questionsList');
                const q = res.questions || [];
                list.innerHTML = q.length ? q.map(x =>
                    `<p><strong>${x.question_text}</strong> — ${x.question_type}</p>`
                ).join('') : '<p style="color: var(--text-secondary);">No questions.</p>';
            } catch (e) { console.error(e); }
        }
        document.getElementById('questionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const fd = new FormData(e.target);
                await api('admin/questions', { method: 'POST', body: JSON.stringify(Object.fromEntries(fd)) });
                document.getElementById('msg').className = 'alert alert-success';
                document.getElementById('msg').textContent = 'Question created.';
                document.getElementById('msg').style.display = 'block';
                e.target.reset();
                loadQuestions();
            } catch (err) {
                document.getElementById('msg').className = 'alert alert-danger';
                document.getElementById('msg').textContent = err.message;
                document.getElementById('msg').style.display = 'block';
            }
        });
        async function logout() { await api('auth/logout', { method: 'POST' }); }
        loadQuestions();
    </script>
</body>
</html>
